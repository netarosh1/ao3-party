<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Archive of Our Own</title>

<style>
:root{
    --ao3-red:#990000;
    --ao3-bg:#f3f3f3;
    --ao3-border:#c8c8c8;
    --ao3-text:#2a2a2a;
    --ao3-serif:"Georgia", "Times New Roman", serif;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:var(--ao3-bg);
    font-family: "Lucida Grande", "Lucida Sans Unicode", Arial, sans-serif;
    color:var(--ao3-text);

    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.popup{
    width:min(90vw,550px);

    background:white;
    border:1px solid var(--ao3-border);
    border-radius:4px;

    overflow:hidden;

    box-shadow:
        0 6px 18px rgba(0,0,0,.18);
}

.header{
    background:var(--ao3-red);
    color:white;

    padding:14px 20px;

    font-size:1.15rem;
    font-weight: normal;
    font-family:var(--ao3-serif);

}

.content{
    padding:24px;
    line-height:1.6;
}

.content h2{
    margin-top:0;
    color:var(--ao3-red);
    font-family:var(--ao3-serif);

}

ul{
    padding-left:22px;
}

.button-row{
    display:flex;
    justify-content:flex-end;
    gap:10px;

    margin-top:28px;
}

button{
    background: #eee;
    color: #444;
    width: auto;
    font-weight: 400;
    font-size: 100%;
    line-height: 1.286;
    vertical-align: middle;
    display: inline-block;
    padding: 0.25em 0.75em;
    white-space: nowrap;
    overflow: visible;
    position: relative;
    text-decoration: none;
    border: 1px solid #bbb;
    border-bottom: 1px solid #aaa;
    background-image: -moz-linear-gradient(#fff 2%,#ddd 95%, #bbb 100%);
    background-image: -webkit-linear-gradient(#fff 2%, #ddd 95%, #bbb 100%);
    background-image: -o-linear-gradient(#fff 2%,#ddd 95%, #bbb 100%);
    background-image: -ms-linear-gradient(#fff 2%,#ddd 95%, #bbb 100%);
    background-image: linear-gradient(#fff 2%, #ddd 95%, #bbb 100%);
    border-radius: 0.25em;
    box-shadow: none;
}

.footer{
    padding:12px 20px;

    font-size:.85rem;

    color:#666;

    border-top:1px solid #ddd;
}
.kudos_notice{
    background:#d1e1ef;
    border:1px solid #c2d2df;
    margin:0.643em auto;
    padding:0.25em 0.375em;
    clear:right;
    box-shadow:inset 1px 1px 2px;
    border-radius:0.25em;
    word-wrap:break-word;
}

.kudos_error{
    background:#efd1d1;
    border:1px solid #900;
    margin:0.643em auto;
    padding:0.25em 0.375em;
    clear:right;
    box-shadow:1px 1px 2px;
    border-radius:0.25em;
    word-wrap:break-word;
}
a,
a:link,
a:visited:hover{
    color:#111;
    text-decoration:none;
    border-bottom:1px solid;
}

a.tag{
    color:#111;
    line-height:1.5;
    text-decoration:none;
    padding:0;
    border-bottom:1px dotted;
}
.tags{
    list-style-type:none;
    padding-left:0;
}

.tags li{
    display:inline;
    margin-right:0.5em;
}
</style>
</head>

<body>

<div class="popup">

<div class="header">
Archive of Our Own
</div>

<div class="content" id="content">
</div>

<div class="footer">
AO3 Birthday Experience v1.0
</div>

</div>
<script>

const pages = {

    home: `
        <h2>Archive Successfully Loaded</h2>

        <p>
        Welcome to the Archive.
        </p>

        <p><strong>Archive Warnings</strong></p>

        <ul class="tags">
    <li><a class="tag" href="#">Cake</a></li>
    <li><a class="tag" href="#">Domestic Fluff</a></li>
    <li><a class="tag" href="#">Found Family</a></li>
    <li><a class="tag" href="#">Partying</a></li>
</ul>

        <div class="button-row">
            <button class="secondary"
            onclick="window.close()">
            Cancel
            </button>

            <button class="primary"
            onclick="alert('Welcome to the archive ❤️')">
            Proceed
            </button>
        </div>
    `,


    kudos: `
    <h2>Kudos</h2>

    <div id="kudos-result"></div>

`,


    library: `
    <h2>Work Discovered: The Library</h2>

    <p>
    You found a hidden chapter in the Archive.
    </p>

    <p>
    Tags:
    </p>

    <ul class="tags">
    <li><a class="tag" href="#">Books</a></li>
    <li><a class="tag" href="#">Quiet Moments</a></li>
    <li><a class="tag" href="#">Dark Academia Aesthetic</a></li>
    <li><a class="tag" href="#">X Reader</a></li>
</ul>
`,

kitchen: `
    <h2>Work Discovered: The Kitchen</h2>

    <p>
    A new work has been added to your collection.
    </p>

    <p>
    Tags:
    </p>

   <ul class="tags">
    <li><a class="tag" href="#">Cake</a></li>
    <li><a class="tag" href="#">Sickly Sweet</a></li>
    <li><a class="tag" href="#">Dead Dove: Do Not Eat</a></li>
    <li><a class="tag" href="#">Domestic Bliss</a></li>
</ul>
`,

collection: `
    <h2>Your Archive Collection</h2>

    <ul id="collection-list"></ul>
`,
};


// Read ?page=something from URL

const params = new URLSearchParams(window.location.search);

const page = params.get("page") || "home";


// Insert correct content

document.getElementById("content").innerHTML =
    pages[page] || pages.home;
// ----------------------
// KUDOS SYSTEM
// ----------------------

if(page === "kudos") {

    const notice = document.getElementById("kudos-result");


    if(localStorage.getItem("gaveKudos")) {

        notice.className = "kudos_error";

        notice.innerHTML = `
            You have already left kudos here.
        `;


    } else {

        notice.className = "kudos_notice";

        notice.innerHTML = `
            Thank you for leaving kudos!
        `;

        localStorage.setItem("gaveKudos", "true");
    }
}

// ----------------------
// SCAVENGER HUNT
// ----------------------

const discoveries = {
    door: "The Door",
    library: "The Library",
    kitchen: "The Kitchen",
    secret: "The Secret Work"
};


if(discoveries[page]) {

    localStorage.setItem(
        page + "Found",
        "true"
    );

}


// Collection page

if(page === "collection") {

    let list = "";

    for(let item in discoveries){

        if(localStorage.getItem(item + "Found")){

            list += `
            <li>
            ☑ ${discoveries[item]}
            </li>
            `;

        } else {

            list += `
            <li>
            ☐ ${discoveries[item]}
            </li>
            `;
        }
    }


    document.getElementById("collection-list").innerHTML = list;


    const completed =
        Object.keys(discoveries)
        .every(item =>
            localStorage.getItem(item + "Found")
        );


    if(completed){

        document.getElementById("collection-list").innerHTML +=
        `
        <br>
        <strong>
        🎉 Collection complete!
        <br>
        Final work unlocked.
        </strong>
        `;
    }

}

</script>
</body>
</html>
