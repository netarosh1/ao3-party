<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Archive of Our Own</title>

<style>
:root{
    --ao3-red:#990000;
    --ao3-bg:#f3f3f3;
    --ao3-border:#c8c8c8;
    --ao3-text:#2a2a2a;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:var(--ao3-bg);
    font-family: "Lucida Grande", "Lucida Sans Unicode", Arial, sans-serif;
    color:var(--ao3-text);

    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.popup{
    width:min(90vw,550px);

    background:white;
    border:1px solid var(--ao3-border);
    border-radius:4px;

    overflow:hidden;

    box-shadow:
        0 6px 18px rgba(0,0,0,.18);
}

.header{
    background:var(--ao3-red);
    color:white;

    padding:14px 20px;

    font-size:1.15rem;
    font-weight:bold;
}

.content{
    padding:24px;
    line-height:1.6;
}

.content h2{
    margin-top:0;
    color:var(--ao3-red);
}

ul{
    padding-left:22px;
}

.button-row{
    display:flex;
    justify-content:flex-end;
    gap:10px;

    margin-top:28px;
}

button{
    cursor:pointer;

    font-family:inherit;
    font-size:1rem;

    padding:10px 18px;

    border-radius:4px;

    border:1px solid var(--ao3-red);

    transition:.15s;
}

.primary{
    background:var(--ao3-red);
    color:white;
}

.primary:hover{
    background:#7f0000;
}

.secondary{
    background:white;
    color:var(--ao3-red);
}

.secondary:hover{
    background:#f6f6f6;
}

.footer{
    padding:12px 20px;

    font-size:.85rem;

    color:#666;

    border-top:1px solid #ddd;
}
</style>
</head>

<body>

<div class="popup">

<div class="header">
Archive of Our Own
</div>

<div class="content">

<h2>Archive Successfully Loaded</h2>

<p>
Welcome to the Archive.
</p>

<p><strong>Archive Warnings</strong></p>

<ul>
<li>Major Character Embarrassment</li>
<li>Graphic Depictions of Birthday Cake</li>
<li>Creator Chose Not To Use Archive Warnings</li>
</ul>

<div class="button-row">

<button class="secondary"
onclick="window.close()">
Cancel
</button>

<button class="primary"
onclick="alert('Welcome to the archive ❤️')">
Proceed
</button>

</div>

</div>

<div class="footer">
AO3 Birthday Experience v1.0
</div>

</div>

</body>
</html>
